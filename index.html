<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #050505;
      }

      #boot-growth-prompt {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      body[data-app-ready="1"] #boot-growth-prompt {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-card {
        width: min(360px, calc(100vw - 40px));
        border-radius: 32px;
        background: #fffaf4;
        color: #2f261d;
        box-shadow: 0 24px 70px rgba(78, 56, 35, 0.24);
        padding: 20px;
        font-family: Arial, sans-serif;
      }

      .boot-topline {
        color: #b4834a;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .boot-title {
        margin: 6px 0 4px;
        font-size: 24px;
        line-height: 1.05;
        font-weight: 900;
      }

      .boot-copy {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        color: #8f7f6d;
      }

      .boot-panel {
        margin-top: 18px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(234, 223, 206, 0.8);
        padding: 16px;
      }

      .boot-bar {
        margin-top: 10px;
        height: 8px;
        border-radius: 999px;
        background: #ebe2d4;
        overflow: hidden;
      }

      .boot-bar > span {
        display: block;
        width: 72%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #edbd79 0%, #ff2e67 100%);
      }

      .boot-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .boot-tile {
        border-radius: 18px;
        background: #fff;
        border: 1px solid #eee3d8;
        padding: 10px 8px;
      }

      .boot-tile h4 {
        margin: 0;
        font-size: 10px;
        line-height: 1.3;
      }

      .boot-action {
        margin-top: 10px;
        height: 34px;
        width: 100%;
        border-radius: 999px;
        border: 0;
        background: #2f261d;
        color: #fff;
        font-size: 11px;
        font-weight: 800;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B_PfkV6d.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B838O0Sr.css">
  </head>
  <body>
    <div id="boot-growth-prompt" aria-hidden="true">
      <div class="boot-card">
        <div class="boot-topline">TODAY</div>
        <div class="boot-title">2/3 Complete</div>
        <p class="boot-copy">Join one forming topic to unlock today's record.</p>
        <div class="boot-panel">
          <h4 style="margin:0;font-size:11px;color:#8f7f6d;font-weight:800;">Closest circle</h4>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;">
            <div style="font-size:14px;font-weight:800;">Today's city sound</div>
            <div style="text-align:right;color:#b4834a;font-size:22px;font-weight:900;line-height:1;">6/8</div>
          </div>
          <div class="boot-bar"><span></span></div>
          <div class="boot-grid">
            <div class="boot-tile">
              <h4>Browse 3 creations</h4>
              <button class="boot-action" type="button">Claim</button>
            </div>
            <div class="boot-tile">
              <h4>Reply to one friend</h4>
              <button class="boot-action" type="button">Done</button>
            </div>
            <div class="boot-tile">
              <h4>Join a forming topic</h4>
              <button class="boot-action" type="button">Done</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
